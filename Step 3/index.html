<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix | Định Hướng Nghề Nghiệp Gen Z</title>
    <meta name="description"
        content="Website định hướng nghề nghiệp phong cách tối giản dành cho thế hệ Gen Z. Khám phá bản thân và tìm kiếm lộ trình sự nghiệp phù hợp.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/Step 3/style.css">
    <style>
        .home-btn {
            position: fixed;
            top: 1.2rem;
            left: 1.2rem;
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.55rem 1.1rem;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 100px;
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 600;
            color: #111;
            text-decoration: none;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: all 0.2s ease;
        }
        .home-btn:hover {
            background: #fff;
            box-shadow: 0 6px 28px rgba(0,0,0,0.14);
            transform: translateY(-1px);
        }
    </style>
</head>

<body>
    <!-- 
    <nav class="navbar">
        <div class="logo">MATRIX</div>
        <ul class="nav-links">
            <li><a href="#about">Về chúng tôi</a></li>
            <li><a href="#careers">Nghề nghiệp</a></li>
            <li><a href="#test">Trắc nghiệm</a></li>
        </ul>
        <div class="nav-cta">
            <button class="btn btn-black">Bắt đầu</button>
        </div>
    </nav>
    -->

    <main>
        <!-- Back to Homepage Button -->
        <a href="/homepage-career-main/" class="home-btn">
            ← Trang chủ
        </a>
        <!-- Career Explorer View (from Screenshot) -->
        <section id="explorer" class="explorer-view">
            <div class="explorer-nav">
                <div class="nav-tab active" onclick="location.href='/Step 3/'">Mở lối sự nghiệp</div>
                <div class="nav-tab" id="tab-detail">Chi tiết nghề nghiệp</div>
                <div class="nav-tab" id="tab-roadmap">Lộ trình thực hiện</div>
            </div>

            <div class="matrix-canvas" id="matrix-canvas">
                <!-- Dots background will be handled by CSS -->
                <div class="matrix-grid"></div>

                <!-- Central Hub -->
                <div class="central-hub">
                    <div class="hub-content">
                        <p id="hub-title">Phân tích <br> chi tiết bản thân</p>
                        <div class="hub-icons">🎓 💪</div>
                        <div class="hub-arrow">↓</div>
                    </div>
                    <div class="hub-glow"></div>
                </div>

                <!-- Career Nodes (Generated by JS) -->
                <div id="career-nodes"></div>

                <!-- Strengths Modal (Full-Screen Typewriter) -->
                <div id="strengths-modal" class="modal">
                    <div class="modal-content-fullscreen">
                        <span class="close-modal">&times;</span>
                        <div class="typing-container">
                            <h2 id="typing-title"></h2>
                            <div id="typing-text"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="/Step 3/main.js"></script>
</body>

</html>
